name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile Python files
        run: python -m py_compile server.py import_csv.py tests/test_server.py

      - name: Run tests
        run: python -m unittest discover -s tests
